version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - redis
    env_file:
      - .env
    environment:
      # Compose network hostname for the redis service.
      FLYIO_REDIS_URL: redis://redis:6379
      PORT: 3000
    ports:
      - '3000:3000'
    restart: unless-stopped

  redis:
    build:
      context: ./redis
      dockerfile: Dockerfile
    ports:
      - '6379:6379'
    restart: unless-stopped
